<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Haptobiosis — Culture</title>
    <link rel="stylesheet" href="/src/ui/style.css" />
  </head>
  <body>
    <div id="app">
      <canvas id="scene"></canvas>

      <!-- Écran de veille -->
      <div id="screensaver" class="overlay">
        <div class="ss-inner">
          <div class="ss-colony" aria-hidden="true"></div>
          <h1 class="ss-title">HAPTOBIOSIS</h1>
          <p class="ss-sub">culture en sommeil</p>
          <p class="ss-hint">touchez une touche · bougez la souris</p>
        </div>
      </div>

      <!-- HUD discret en mode éveillé -->
      <div id="hud" class="hud hidden">
        <div class="hud-row"><span class="hud-k">colonies</span><span id="hud-colonies" class="hud-v">0</span></div>
        <div class="hud-row"><span class="hud-k">biomasse</span><span id="hud-mass" class="hud-v">0.0</span></div>
        <div class="hud-hint" id="hud-hint">survolez le clavier · tapez pour ensemencer</div>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
